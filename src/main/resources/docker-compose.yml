services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-events-postgres
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
      POSTGRES_DB: bank_events
    ports:
      - "5511:5432"
    volumes:
      - ./init-view.sql:/docker-entrypoint-initdb.d/init-view.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank -d bank_events"]
      interval: 5s
      timeout: 5s
      retries: 5